# ==============================================================================
# Example Nginx Configuration for TradeX Asia
# 
# This file provides a template to deploy your React frontends and Django backend.
# Replace `/var/www/TradeX` with the actual path to your project on the server.
# ==============================================================================

# 1. Main Frontend (React App)
server {
    listen 80;
    server_name tradexasia.online www.tradexasia.online;

    # Point to the Vite build output folder
    root /var/www/TradeX/frontend/dist;
    index index.html;

    # React Router setup: Fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}

# 2. Admin Frontend (React App)
server {
    listen 80;
    server_name admin.tradexasia.online;

    # Point to the Vite build output folder for the admin dashboard
    root /var/www/TradeX/admin-frontend/dist;
    index index.html;

    # React Router setup: Fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}

# 3. Backend API (Django Application)
server {
    listen 80;
    server_name api.tradexasia.online;

    # Serve Django Static Files (you must run `python manage.py collectstatic` first)
    location /static/ {
        alias /var/www/TradeX/backend/staticfiles/;
    }

    # Serve Django Media Files (if you have user-uploaded files)
    location /media/ {
        alias /var/www/TradeX/backend/media/;
    }

    # Proxy API and Admin requests to Gunicorn running the Django app
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
