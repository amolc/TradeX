upstream tradexasialive {
    server 127.0.0.1:6700 fail_timeout=0;
}


server {
    server_name tradexasia.online www.tradexasia.online ;
    return 301 https://$host$request_uri;

    listen       80 ;
    listen       [::]:80 ;

}

server {
    server_name www.tradexasia.online tradexasia.online; # managed by Certbot 
        root         /var/www/TradeX/frontend/dist;
        index index.html;

        # Load configuration files for the default server block.
        include /etc/nginx/default.d/*.conf;

        location / {
          try_files $uri $uri/ /index.html;
        }

        access_log  /var/log/nginx/tradexasia.access.log ;
        error_log /var/log/nginx/tradexasia.error.log error;

        error_page 404 /404.html;
            location = /40x.html {
        }

        error_page 500 502 503 504 /50x.html;
            location = /50x.html {
        }


    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate  /etc/letsencrypt/live/tradexasia.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key  /etc/letsencrypt/live/tradexasia.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}